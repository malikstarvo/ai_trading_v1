services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ai_trading
      POSTGRES_USER: ${DB_USER:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trader_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trader} -d ai_trading"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  trader:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/cmdline || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - COLLECTOR_WS_URL=${COLLECTOR_WS_URL:-wss://stream.bybit.com/v5/public/linear}
      - COLLECTOR_REST_URL=${COLLECTOR_REST_URL:-https://api.bybit.com}
      - COLLECTOR_SYMBOLS=${COLLECTOR_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT}
      - COLLECTOR_TESTNET=${COLLECTOR_TESTNET:-false}
      - COLLECTOR_BACKFILL_DAYS=${COLLECTOR_BACKFILL_DAYS:-90}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-trader}
      - DB_PASSWORD=${DB_PASSWORD:-trader_pass}
      - DB_NAME=ai_trading
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_pass}@postgres:5432/ai_trading
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
